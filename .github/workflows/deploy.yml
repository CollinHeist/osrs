# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ['main']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: 'tangleroot/package-lock.json'

      - name: Install dependencies
        working-directory: tangleroot
        run: npm ci

      - name: Build
        working-directory: tangleroot
        run: npm run build

      - name: Stage Pages artifact
        run: |
          mkdir -p _site/prayer _site/tangleroot _site/training
          cp index.html _site/index.html
          cp prayer/index.html _site/prayer/index.html
          cp gear/index.html _site/gear/index.html
          cp training/index.html _site/training/index.html
          cp -R tangleroot/dist/. _site/tangleroot/

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          # Upload the staged Pages site
          path: './_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
